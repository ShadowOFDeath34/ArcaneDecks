name: Test Game

on:
  push:
    branches: [main]
    paths:
      - 'Shared/**'
      - 'Platforms/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Shared/**'
      - 'Platforms/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore solution
        run: dotnet restore ArcaneDecks.sln

      - name: Build solution
        run: dotnet build ArcaneDecks.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ArcaneDecks.sln --no-build --configuration Release --verbosity normal
