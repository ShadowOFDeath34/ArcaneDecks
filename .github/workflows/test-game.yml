name: Test Game

on:
  push:
    branches: [main]
    paths:
      - 'Shared/**'
      - 'Platforms/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Shared/**'
      - 'Platforms/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Core + Tests
        run: |
          dotnet restore Shared/ArcaneDecks.Core/ArcaneDecks.Core.csproj
          dotnet restore Shared/ArcaneDecks.Core.Tests/ArcaneDecks.Core.Tests.csproj

      - name: Build Core + Tests
        run: |
          dotnet build Shared/ArcaneDecks.Core/ArcaneDecks.Core.csproj --no-restore --configuration Release
          dotnet build Shared/ArcaneDecks.Core.Tests/ArcaneDecks.Core.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Shared/ArcaneDecks.Core.Tests/ArcaneDecks.Core.Tests.csproj --no-build --configuration Release --verbosity normal
